name: OpenAI AI PR Review

on:
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  openai-code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate AI Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Error: OPENAI_API_KEY is not set. Please add it to your repository secrets."
            exit 1
          fi

          echo "Fetching base branch..."

          git fetch origin "${{ github.base_ref }}"

          echo "Collecting changed files..."

          CHANGED_FILES=$(git diff \
            --name-only \
            origin/${{ github.base_ref }}...HEAD)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No source files changed."
            exit 0
          fi

          FILE_COUNT=$(echo "$CHANGED_FILES" | wc -l)

          if [ "$FILE_COUNT" -gt 50 ]; then
            echo "PR is too large ($FILE_COUNT files). Skipping AI review."
            exit 0
          fi

          echo "Generating diff..."
          
          
          # 1. Get the lines of code changed in this Pull Request
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          
          if [ ! -s pr_diff.txt ]; then
            echo "No code changes detected."
            exit 0
          fi

          # 2. Build the payload using jq for safe JSON construction
          MAX_SIZE=80000

          DIFF_SIZE=$(wc -c < pr_diff.txt)

          if [ "$DIFF_SIZE" -gt "$MAX_SIZE" ]; then
              echo "Diff is too large. Trimming..."
              head -c "$MAX_SIZE" pr_diff.txt > diff.txt
          else
              cp pr_diff.txt diff.txt
          fi

          DIFF_CONTENT=$(cat diff.txt)

          PROMPT=$(cat <<EOF
          You are a Principal Android and Kotlin Multiplatform Architect.
          
          Review this Pull Request exactly as you would review code from another senior engineer.
          
          Review ONLY meaningful issues.
          
          Ignore formatting, naming and style unless they introduce maintainability problems.

          Focus on:
          
            • Correctness
            • Bugs
            • Crash risks
            • Coroutine misuse
            • Flow misuse
            • Thread safety
            • Compose recomposition issues
            • Lifecycle issues
            • Memory leaks
            • Performance
            • SOLID principles
            • Clean Architecture
            • Dependency Injection
            • Scalability
            • Testability
            • Security
            • KMP compatibility

          For every issue provide:
          
          Severity:
            Critical / High / Medium / Low
          
          Location:
            (file/function)
            
            Problem
            
            Why it matters
            
            Suggested Fix
          
          If there are no significant issues respond only with:
          
            LGTM ✅
            No significant architectural or implementation issues found.


          Changed Files:
          
            $CHANGED_FILES

            Git Diff:
            
              $DIFF_CONTENT
              EOF
              )
              
              PAYLOAD=$(jq -n \
              --arg prompt "$PROMPT" \
              '{
            model: "gpt-5.5",
            input: $prompt
            }')
            
                      echo "Calling OpenAI..."
            
                      RESPONSE=$(curl \
                        --silent \
                        --show-error \
                        --fail \
                        https://api.openai.com/v1/responses \
                        -H "Authorization: Bearer '"$OPENAI_API_KEY"'" \
                        -H "Content-Type: application/json" \
                        -d "$PAYLOAD")
            
                      REVIEW=$(echo "$RESPONSE" | jq -r '.output_text // empty')
              
              if [ -z "$REVIEW" ]; then
              echo "OpenAI returned an empty response."
              echo "$RESPONSE"
              exit 1
              fi
              
              {
                echo "## 🤖 OpenAI PR Review"
                echo
                echo "---"
                echo
                echo "$REVIEW"
                echo
                echo "---"
                echo
                echo "_Generated automatically using OpenAI_"
              } > review.md
              
              echo "Posting PR comment..."
              
              gh pr comment \
                ${{ github.event.pull_request.number }} \
                --body-file review.md