name: KMP CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Job to detect changes and determine which jobs to run
  changes:
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: shell
          filters: |
            ios:
              - 'shared/**'
              - 'api/**'
              - 'foundation/**'
              - 'network/**'
              - 'features/**'
              - '.github/workflows/KMP_Project_Build.yml'
            android:
              - 'androidApp/**'
              - 'shared/**'
              - 'api/**'
              - 'foundation/**'
              - 'network/**'
              - 'features/**'
              - '.github/workflows/KMP_Project_Build.yml'

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'zulu'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Quality Checks
        run: ./gradlew ktlintCheck detekt buildHealth --continue --parallel

  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'zulu'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android Lint
        run: ./gradlew lint --continue --parallel

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'zulu'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run Unit Tests
        run: ./gradlew allTests --parallel

  build-android:
    name: Build Android App
    needs: changes
    if: ${{ needs.changes.outputs.android == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'zulu'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android App
        run: ./gradlew :androidApp:assembleDebug

  build-ios:
    name: Build iOS Shared Framework
    needs: changes
    if: ${{ needs.changes.outputs.ios == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'zulu'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build iOS Framework
        # Safely tests iOS compilation by linking your 'shared' module framework
        # :shared:embedAndSignAppleFrameworkForXcode
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
