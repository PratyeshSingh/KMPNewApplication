name: KMP CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Code Quality & Dependency Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Broadcasts checks across api, features, foundation, network, and shared
      - name: Check Formatting (KtLint)
        run: ./gradlew ktlintCheck --continue

      - name: Run Detekt Analysis
        run: ./gradlew detekt --continue

      - name: Run Android Lint
        run: ./gradlew lint --continue

      - name: Run Dependency Analyzer
        run: ./gradlew buildHealth

  build-and-test:
    name: Build Android & Tests
    needs: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run JVM & Common Tests
        run: ./gradlew jvmTest

      - name: Build Android App
        # Explicitly targets your application module
        run: ./gradlew :androidApp:assembleDebug

  build-ios:
    name: Build iOS Shared Framework
    needs: code-quality
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build iOS Framework
        # Safely tests iOS compilation by linking your 'shared' module framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
